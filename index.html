<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Складской Учет</title>
    <!-- PWA манифест -->
    <link rel="manifest" href="manifest.json">
    <!-- Иконки -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <style>
        /* Простые стили для мобильного вида */
        body { font-family: sans-serif; margin: 10px; }
        .tab-bar { display: flex; margin-bottom: 15px; background: #eee; border-radius: 8px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; border: none; background: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #007aff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { border: 1px solid #ccc; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 8px 15px; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button.danger { background: #ff3b30; }
        input, select { padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }
        .camera-btn { background: #34c759; font-size: 20px; }
        #syncStatus { font-size: 12px; color: gray; text-align: center; margin: 5px; }
        .preview-img { max-width: 100px; max-height: 100px; margin-left: 10px; border-radius: 5px; }
        .edit-area { border: 1px dashed #007aff; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>📦 Склад</h1>
    <div id="syncStatus">🔄 Проверка связи...</div>

    <!-- Навигация -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="openTab('stock', event)">🏬 Товары</button>
        <button class="tab-btn" onclick="openTab('add', event)">➕ Приход</button>
        <button class="tab-btn" onclick="openTab('take', event)">➖ Взять</button>
        <button class="tab-btn" onclick="openTab('journal', event)">📋 Журнал</button>
    </div>

    <!-- Контент вкладок -->
    <div id="stock" class="tab-content active"></div>
    <div id="add" class="tab-content">
        <h3>Новый приход (Ручной ввод)</h3>
        <input type="text" id="newName" placeholder="Наименование">
        <input type="number" id="newQty" placeholder="Количество">
        <input type="text" id="newUnit" placeholder="Ед. изм (шт, кг)" value="шт">
        <button onclick="addItem()">✅ Добавить на склад</button>
        <hr>
        <h3>Загрузить из фото списка</h3>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
        <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">📸 Сканировать список</button>
        <div id="scanResult" class="edit-area">Здесь появится распознанный текст для редактирования...</div>
        <button id="saveScannedBtn" style="display:none;" onclick="saveScannedData()">💾 Сохранить распознанное</button>
    </div>
    <div id="take" class="tab-content">
        <h3>Взять со склада</h3>
        <input type="text" id="searchItem" placeholder="Поиск по названию..." oninput="renderTakeList()">
        <div id="takeList"></div>
    </div>
    <div id="journal" class="tab-content"></div>

    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
